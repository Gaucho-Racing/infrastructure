# In-cluster handle for the external Postgres EC2.
#
# Implemented as an ExternalName Service: CoreDNS returns a CNAME to
# the EC2 instance's AWS-assigned hostname, which AWS's split-horizon
# DNS resolves to the private IP from inside the VPC (and to the public
# EIP from outside). Pods dial `postgres.sentinel.svc.cluster.local` →
# they end up on the private ENI without hairpinning out to the IGW.
#
# The hostname encodes the EIP (52.32.150.44). The EIP is stable across
# instance replacements (it's a separate aws_eip resource pinned in
# terraform). If the EIP ever does change, update this file.
#
# Why ExternalName instead of a selectorless Service + manual
# EndpointSlice: argocd-cm's default resource.exclusions skips
# EndpointSlice because most are controller-generated. A manual one
# silently doesn't sync. ExternalName isn't excluded, so GitOps owns
# this Service fully.

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sentinel
spec:
  type: ExternalName
  externalName: ec2-52-32-150-44.us-west-2.compute.amazonaws.com
