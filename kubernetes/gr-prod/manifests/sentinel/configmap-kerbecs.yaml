# Kerbecs gateway routing rules. Mounted into the kerbecs pod at
# /etc/kerbecs/kerbecs.yaml — KERBECS_CONFIG points the binary at it.
#
# Upstreams reference the in-cluster Services by name (cross-namespace
# resolution not needed since everything lives in `sentinel`). The web
# upstream points at port 80 (the nginx-served prod build), unlike the
# docker-compose dev setup where vite serves on 5173.

apiVersion: v1
kind: ConfigMap
metadata:
  name: kerbecs-config
  namespace: sentinel
data:
  kerbecs.yaml: |
    gateway:
      name: sentinel-gateway
      version: 0.1.0
      env: ${ENV:PROD}
      timeouts:
        dial: 5s
        headers: 30s
        idle: 50s
        overall: 0

    listeners:
      gateway:
        port: "10310"
        cors:
          enabled: true
          allowed_origins: ["*"]
          allow_credentials: false
      admin:
        port: "10300"
        auth:
          type: basic
          username: ${KERBECS_USER:admin}
          password: ${KERBECS_PASSWORD:admin}

    providers:
      static:
        # Hot-reload the config on ConfigMap updates (kerbecs >= 3.1.0). The
        # watcher reacts to the kubelet ..data symlink swap, so route changes
        # apply without restarting the pod.
        watch: true

    upstreams:
      core:
        name: sentinel-core
        version: 0.1.0
        instances:
          - http://core.sentinel.svc.cluster.local:9999

      oauth:
        name: sentinel-oauth
        version: 0.1.0
        instances:
          - http://oauth.sentinel.svc.cluster.local:9997

      discord:
        name: sentinel-discord
        version: 0.1.0
        instances:
          - http://discord.sentinel.svc.cluster.local:9998

      saml:
        name: sentinel-saml
        version: 0.1.0
        instances:
          - http://saml.sentinel.svc.cluster.local:9996

      google:
        name: sentinel-google
        version: 0.1.0
        instances:
          - http://google.sentinel.svc.cluster.local:9995

      web:
        name: sentinel-web
        version: 0.1.0
        instances:
          - http://web.sentinel.svc.cluster.local:80

    routes:
      - name: core-internal
        match:
          path: /api/core/*
        upstream: core
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: core-users
        match:
          path: /api/users/*
        upstream: core
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: core-applications
        match:
          path: /api/applications/*
        upstream: core
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: core-groups
        match:
          path: /api/groups/*
        upstream: core
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: core-entities
        match:
          path: /api/entities/*
        upstream: core
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: oauth
        match:
          path: /api/oauth/*
        upstream: oauth
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: auth
        match:
          path: /api/auth/*
        upstream: oauth
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: discord
        match:
          path: /api/discord/*
        upstream: discord
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: google
        match:
          path: /api/google/*
        upstream: google
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      # SAML consent endpoints — the SPA calls these through the /api prefix.
      - name: saml
        match:
          path: /api/saml/*
        upstream: saml
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      # OIDC discovery must live at the issuer root (no /api prefix), so route
      # it straight to oauth without stripping anything.
      - name: well-known
        match:
          path: /.well-known/*
        upstream: oauth
        envelope: passthrough

      # SAML IdP metadata and SSO endpoint live at the issuer root (no /api
      # prefix) so the URLs published in metadata are clean and stable. The
      # SPA-served /saml/authorize consent page is NOT listed here, so it falls
      # through to the web frontend below.
      - name: saml-metadata
        match:
          path: /saml/metadata
        upstream: saml
        envelope: passthrough

      - name: saml-sso
        match:
          path: /saml/sso
        upstream: saml
        envelope: passthrough

      - name: web-frontend
        match:
          path: /*
        upstream: web
        envelope: passthrough
