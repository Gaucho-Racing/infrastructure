# Public entrypoint. ALB controller picks the *.gauchoracing.com origin
# cert via host SAN match; external-dns creates the proxied Cloudflare
# record. All traffic terminates at the kerbecs gateway port (10310),
# which then routes to the backend services + dashboard internally.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mapache
  namespace: mapache
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    # Share the gr-prod ALB with argocd / sentinel — same group name.
    alb.ingress.kubernetes.io/group.name: gr-prod

    external-dns.alpha.kubernetes.io/hostname: mapache.gauchoracing.com
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  ingressClassName: alb
  tls:
    - hosts:
        - mapache.gauchoracing.com
  rules:
    - host: mapache.gauchoracing.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kerbecs
                port:
                  number: 10310
