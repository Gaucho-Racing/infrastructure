apiVersion: apps/v1
kind: Deployment
metadata:
  name: query
  namespace: mapache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query
  template:
    metadata:
      labels:
        app: query
    spec:
      # Spread across at least 2 nodes (minDomains) but tolerate skew
      # up to 1 (so 3 replicas → [2,1], not forced [1,1,1]).
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: query
      containers:
        - name: query
          image: ghcr.io/gaucho-racing/mapache/query:latest
          ports:
            - containerPort: 7010
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "7010"
            - name: DATABASE_HOST
              value: postgres.mapache.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: mapache
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: DATABASE_PASSWORD
            # ClickHouse holds the telemetry tables (signal, gr26_can, ping).
            # The query service uses clickhouse-connect over HTTP, so it needs
            # the HTTP port 8123 — distinct from gr26's native 9000. Password
            # is shared with gr26 via mapache-secrets/CLICKHOUSE_PASSWORD.
            - name: CLICKHOUSE_HOST
              value: gr-clickhouse.gauchoracing.com
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: CLICKHOUSE_USER
              value: admin
            - name: CLICKHOUSE_DATABASE
              value: mapache
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: KERBECS_ENDPOINT
              value: http://kerbecs.mapache.svc.cluster.local:10300
            - name: KERBECS_USER
              value: admin
            - name: KERBECS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: KERBECS_PASSWORD
            # Sentinel v5: JWKS lives at /api/core/keys under SENTINEL_URL,
            # so the separate JWKS env var is gone (main.py derives it).
            - name: SENTINEL_URL
              value: https://sso.gauchoracing.com
            - name: SENTINEL_CLIENT_ID
              value: TIvD6jCH3mGV
---
apiVersion: v1
kind: Service
metadata:
  name: query
  namespace: mapache
spec:
  selector:
    app: query
  ports:
    - port: 7010
      targetPort: 7010
