# EKS Auto Mode provides the AWS Load Balancer Controller on managed
# infrastructure (it's not visible as a Deployment in this cluster) but
# doesn't auto-register an IngressClass. Without this resource,
# Ingresses with `ingressClassName: alb` are ignored — the controller
# only acts when an IngressClass exists whose spec.controller matches
# its own identifier (eks.amazonaws.com/alb).
#
# Marked as the cluster-default class so future Ingresses without an
# explicit ingressClassName still get picked up.

apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: eks.amazonaws.com/alb
