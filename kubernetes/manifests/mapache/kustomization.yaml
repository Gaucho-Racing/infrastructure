# Kustomize entrypoint — ArgoCD auto-detects this file and runs
# `kustomize build` instead of treating the dir as a flat manifest set.
#
# The `images` block below is the single source of truth for mapache
# service versions. Bumping a release looks like:
#
#   kustomize edit set image \
#     ghcr.io/gaucho-racing/mapache/auth=ghcr.io/gaucho-racing/mapache/auth:3.4.0
#
# (Run from this directory; the per-service publish workflows will
# eventually wrap this across all services on tag push.) That edit only
# touches this file — the Deployment YAMLs stay unchanged, so the diff
# in a release PR is one block.
#
# kerbecs is on its own version stream from the mapache services —
# bump it separately when there's a reason to.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap-kerbecs.yaml
  - postgres.yaml
  - kerbecs.yaml
  - auth.yaml
  - vehicle.yaml
  - gr26.yaml
  - query.yaml
  - foreman.yaml
  - dashboard.yaml
  - ingress.yaml

images:
  - name: ghcr.io/gaucho-racing/mapache/auth
    newTag: latest
  - name: ghcr.io/gaucho-racing/mapache/vehicle
    newTag: latest
  - name: ghcr.io/gaucho-racing/mapache/gr26
    newTag: latest
  - name: ghcr.io/gaucho-racing/mapache/query
    newTag: latest
  - name: ghcr.io/gaucho-racing/mapache/foreman
    newTag: latest
  - name: ghcr.io/gaucho-racing/mapache/dashboard
    newTag: latest
  - name: bk1031/kerbecs
    newTag: 3.2.0
