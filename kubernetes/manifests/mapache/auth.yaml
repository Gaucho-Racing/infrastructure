apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: mapache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: auth
              topologyKey: kubernetes.io/hostname
      containers:
        - name: auth
          # Tag is set by kustomization.yaml's images block.
          image: ghcr.io/gaucho-racing/mapache/auth:latest
          ports:
            - containerPort: 7002
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "7002"
            - name: DATABASE_HOST
              value: postgres.mapache.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: mapache
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: DATABASE_PASSWORD
            - name: KERBECS_ENDPOINT
              value: http://kerbecs.mapache.svc.cluster.local:10300
            - name: KERBECS_USER
              value: admin
            - name: KERBECS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: KERBECS_PASSWORD
            # Sentinel v5 (the k8s deployment) is up, but the OAuth client +
            # JWKS for mapache haven't been migrated over yet. Keep pointing
            # at the legacy hosts until that cutover happens, then bump both
            # to https://sentinel-v5.gauchoracing.com.
            - name: SENTINEL_URL
              value: https://sentinel-api.gauchoracing.com
            - name: SENTINEL_JWKS_URL
              value: https://sso.gauchoracing.com/.well-known/jwks.json
            - name: SENTINEL_CLIENT_ID
              value: z6V9NREjMFhf
            - name: SENTINEL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: SENTINEL_CLIENT_SECRET
            - name: SENTINEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: SENTINEL_TOKEN
            - name: SENTINEL_REDIRECT_URI
              value: https://mapache.gauchoracing.com/auth/login
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: mapache
spec:
  selector:
    app: auth
  ports:
    - port: 7002
      targetPort: 7002
