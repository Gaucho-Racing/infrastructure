# Kerbecs gateway routing rules. Mounted into the kerbecs pod at
# /etc/kerbecs/kerbecs.yaml — KERBECS_CONFIG points the binary at it.
#
# Mirrors the dev Mapache/kerbecs.yaml route table, with upstream
# hostnames switched to in-cluster Services. The dashboard upstream
# points at port 80 (the nginx-served prod build), unlike the dev
# compose where Vite serves on 5173.

apiVersion: v1
kind: ConfigMap
metadata:
  name: kerbecs-config
  namespace: mapache
data:
  kerbecs.yaml: |
    gateway:
      name: mapache-gateway
      version: 0.1.0
      env: ${ENV:PROD}
      limits:
        max_request_bytes: 100MB
        max_response_bytes: 100MB
      timeouts:
        dial: 5s
        headers: 30s
        idle: 90s
        overall: 0

    listeners:
      gateway:
        port: "10310"
        cors:
          enabled: true
          allowed_origins: ["*"]
          allow_credentials: false
      admin:
        port: "10300"
        auth:
          type: basic
          username: ${KERBECS_USER:admin}
          password: ${KERBECS_PASSWORD:admin}

    providers:
      static:
        # Hot-reload on ConfigMap updates (kerbecs >= 3.1.0). The watcher
        # picks up the kubelet ..data symlink swap so route changes apply
        # without restarting the pod.
        watch: true

    upstreams:
      auth:
        name: mapache-auth
        version: 0.1.0
        instances:
          - http://auth.mapache.svc.cluster.local:7002

      vehicle:
        name: mapache-vehicle
        version: 0.1.0
        instances:
          - http://vehicle.mapache.svc.cluster.local:7003

      gr26:
        name: mapache-gr26
        version: 0.1.0
        instances:
          - http://gr26.mapache.svc.cluster.local:7005

      live:
        name: mapache-live
        version: 0.1.0
        instances:
          - http://live.mapache.svc.cluster.local:7015

      query:
        name: mapache-query
        version: 0.1.0
        instances:
          - http://query.mapache.svc.cluster.local:7010

      foreman:
        name: mapache-foreman
        version: 0.1.0
        instances:
          - http://foreman.mapache.svc.cluster.local:7011

      dashboard:
        name: mapache-dashboard
        version: 0.1.0
        instances:
          - http://dashboard.mapache.svc.cluster.local:80

    routes:
      - name: auth
        match:
          path: /api/auth/*
        upstream: auth
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: users
        match:
          path: /api/users/*
        upstream: auth
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: vehicle-ping
        match:
          path: /api/vehicle/ping
        upstream: vehicle
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: vehicles
        match:
          path: /api/vehicles
        upstream: vehicle
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: vehicles-id
        match:
          path: /api/vehicles/*
        upstream: vehicle
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: sessions
        match:
          path: /api/sessions
        upstream: vehicle
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: sessions-id
        match:
          path: /api/sessions/*
        upstream: vehicle
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: gr26-live
        match:
          path: /api/gr26/live
        upstream: gr26
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: gr26
        match:
          path: /api/gr26/*
        upstream: gr26
        rewrite:
          strip_prefix: /api
        envelope: default

      # Specific WS/SSE routes need passthrough so kerbecs doesn't wrap
      # the response envelope or interfere with the connection upgrade.
      # The catch-all `live` route below uses default envelope for the
      # plain HTTP endpoints (/live/ping, /live/stats).
      - name: live-ws
        match:
          path: /api/live/ws
        upstream: live
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: live-sse
        match:
          path: /api/live/sse
        upstream: live
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: live
        match:
          path: /api/live/*
        upstream: live
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: query
        match:
          path: /api/query/*
        upstream: query
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: foreman-events
        match:
          path: /api/foreman/events/*
        upstream: foreman
        rewrite:
          strip_prefix: /api
        envelope: passthrough

      - name: foreman
        match:
          path: /api/foreman/*
        upstream: foreman
        rewrite:
          strip_prefix: /api
        envelope: default

      - name: dashboard
        match:
          path: /*
        upstream: dashboard
        envelope: passthrough
