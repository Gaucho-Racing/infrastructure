apiVersion: apps/v1
kind: Deployment
metadata:
  name: query
  namespace: mapache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query
  template:
    metadata:
      labels:
        app: query
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: query
              topologyKey: kubernetes.io/hostname
      containers:
        - name: query
          image: ghcr.io/gaucho-racing/mapache/query:latest
          ports:
            - containerPort: 7010
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "7010"
            - name: DATABASE_HOST
              value: postgres.mapache.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: mapache
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: DATABASE_PASSWORD
            - name: KERBECS_ENDPOINT
              value: http://kerbecs.mapache.svc.cluster.local:10300
            - name: KERBECS_USER
              value: admin
            - name: KERBECS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: KERBECS_PASSWORD
            - name: SENTINEL_URL
              value: https://sentinel-v5.gauchoracing.com
            - name: SENTINEL_JWKS_URL
              value: https://sentinel-v5.gauchoracing.com/.well-known/jwks.json
            - name: SENTINEL_CLIENT_ID
              value: z6V9NREjMFhf
---
apiVersion: v1
kind: Service
metadata:
  name: query
  namespace: mapache
spec:
  selector:
    app: query
  ports:
    - port: 7010
      targetPort: 7010
