# Gateway. Public traffic enters through the ALB (see ingress.yaml),
# kerbecs routes to the right upstream Service based on its config in
# the kerbecs-config ConfigMap.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kerbecs
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kerbecs
  template:
    metadata:
      labels:
        app: kerbecs
    spec:
      # One replica per node — see comment in core.yaml.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: kerbecs
              topologyKey: kubernetes.io/hostname
      containers:
        - name: kerbecs
          image: bk1031/kerbecs:latest
          ports:
            - containerPort: 10310
              name: gateway
            - containerPort: 10300
              name: admin
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: KERBECS_CONFIG
              value: /etc/kerbecs/kerbecs.yaml
            - name: ENV
              value: PROD
            - name: KERBECS_USER
              value: admin
            - name: KERBECS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: KERBECS_PASSWORD
          volumeMounts:
            - name: kerbecs-config
              mountPath: /etc/kerbecs
              readOnly: true
      volumes:
        - name: kerbecs-config
          configMap:
            name: kerbecs-config
---
apiVersion: v1
kind: Service
metadata:
  name: kerbecs
  namespace: sentinel
spec:
  selector:
    app: kerbecs
  ports:
    - name: gateway
      port: 10310
      targetPort: 10310
    - name: admin
      port: 10300
      targetPort: 10300
