apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
    spec:
      # Hard anti-affinity — two app=core pods literally cannot share a
      # node. With replicas=2 on a single-node cluster, the second pod
      # stays Pending and Karpenter provisions a fresh node to host it.
      # (topologySpreadConstraints with DoNotSchedule looked like the
      # right tool, but its skew math is satisfied when only one node
      # exists, so it doesn't trigger scale-out.)
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: core
              topologyKey: kubernetes.io/hostname
      containers:
        - name: core
          # Tag is set by kustomization.yaml's images block.
          image: ghcr.io/gaucho-racing/sentinel-core:latest
          ports:
            - containerPort: 9999
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "9999"
            - name: DATABASE_HOST
              value: postgres.sentinel.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: sentinel
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: POSTGRES_PASSWORD
            - name: RINCON_ENDPOINT
              value: http://rincon.sentinel.svc.cluster.local:10311
            - name: RINCON_USER
              value: admin
            - name: RINCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: RINCON_PASSWORD
            - name: SERVICE_ENDPOINT
              value: http://core.sentinel.svc.cluster.local:9999
            - name: SERVICE_HEALTH_CHECK
              value: http://core.sentinel.svc.cluster.local:9999/core/ping
            # Comma-separated entity IDs to bootstrap into the Admins
            # group on each boot. Idempotent — safe to leave as-is.
            - name: ADMIN_ENTITY_IDS
              value: "ent_01kt38a23b9ya1w5x4t9dasd86"
---
apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: sentinel
spec:
  selector:
    app: core
  ports:
    - port: 9999
      targetPort: 9999
