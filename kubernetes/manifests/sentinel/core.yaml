apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
    spec:
      # Spread across at least 2 nodes (minDomains) but tolerate skew
      # up to 1 (so 3 replicas → [2,1], not forced [1,1,1]). minDomains
      # makes the scheduler treat the missing-domain count as 0 when
      # only one node currently has matching pods, so the second
      # replica blocks on schedule and Karpenter provisions a node
      # (requires k8s ≥ 1.30 — we're on 1.35).
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: core
      containers:
        - name: core
          # Tag is set by kustomization.yaml's images block.
          image: ghcr.io/gaucho-racing/sentinel-core:latest
          ports:
            - containerPort: 9999
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "9999"
            - name: DATABASE_HOST
              value: postgres.sentinel.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: sentinel
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: POSTGRES_PASSWORD
            # OIDC issuer — the public base URL. MUST match oauth's ISSUER
            # exactly; it's the `iss` claim stamped into signed tokens and the
            # `issuer` advertised by the OAuth discovery document.
            - name: ISSUER
              value: https://sentinel-v5.gauchoracing.com
            # Comma-separated entity IDs to bootstrap into the Admins
            # group on each boot. Idempotent — safe to leave as-is.
            - name: ADMIN_ENTITY_IDS
              value: "ent_01kt38a23b9ya1w5x4t9dasd86"
            # Shared secret each non-core service exchanges at startup
            # for its pre-seeded bearer JWT. Same value as on every
            # other sentinel-* deployment. Rotating it requires a
            # rolling restart of every service so each can re-fetch.
            - name: INTERNAL_BOOTSTRAP_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: INTERNAL_BOOTSTRAP_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: sentinel
spec:
  selector:
    app: core
  ports:
    - port: 9999
      targetPort: 9999
