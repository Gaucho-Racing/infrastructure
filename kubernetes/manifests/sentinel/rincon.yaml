# Service registry. Core/oauth/discord authenticate against it on
# startup to register themselves and discover one another.
#
# Persists state in the shared `sentinel` Postgres db; DB_TABLE_PREFIX
# namespaces rincon's tables so they don't collide with the Go services'
# schemas. AUTH_USER/AUTH_PASSWORD gate write APIs; the same credentials
# are sent by core/oauth/discord as RINCON_USER/RINCON_PASSWORD.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rincon
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rincon
  template:
    metadata:
      labels:
        app: rincon
    spec:
      containers:
        - name: rincon
          image: bk1031/rincon:latest
          ports:
            - containerPort: 10311
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "10311"
            - name: SELF_ENDPOINT
              value: http://rincon:10311
            - name: SELF_HEALTH_CHECK
              value: http://rincon:10311/rincon/ping
            - name: AUTH_USER
              value: admin
            - name: AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: RINCON_PASSWORD
            - name: STORAGE_MODE
              value: sql
            - name: DB_DRIVER
              value: postgres
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_NAME
              value: sentinel
            - name: DB_TABLE_PREFIX
              value: rin_
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: POSTGRES_PASSWORD
            - name: HEARTBEAT_TYPE
              value: server
            - name: HEARTBEAT_INTERVAL
              value: "10"
---
apiVersion: v1
kind: Service
metadata:
  name: rincon
  namespace: sentinel
spec:
  selector:
    app: rincon
  ports:
    - port: 10311
      targetPort: 10311
