# Kustomize entrypoint — ArgoCD auto-detects this file and runs
# `kustomize build` instead of treating the dir as a flat manifest set.
#
# The `images` block below is the single source of truth for sentinel
# service versions. Bumping a release looks like:
#
#   kustomize edit set image \
#     ghcr.io/gaucho-racing/sentinel-core=ghcr.io/gaucho-racing/sentinel-core:5.2.0
#
# (Run from this directory; CI can wrap it across all four images on
# tag push.) That edit only touches this file — the Deployment YAMLs
# stay unchanged, so the diff in a release PR is one block.
#
# rincon and kerbecs are on independent version streams from the
# sentinel services — bump them separately when there's a reason to.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap-kerbecs.yaml
  - postgres.yaml
  - kerbecs.yaml
  - core.yaml
  - oauth.yaml
  - discord.yaml
  - saml.yaml
  - web.yaml
  - ingress.yaml

images:
  - name: ghcr.io/gaucho-racing/sentinel-core
    newTag: 5.5.3
  - name: ghcr.io/gaucho-racing/sentinel-oauth
    newTag: 5.5.3
  - name: ghcr.io/gaucho-racing/sentinel-discord
    newTag: 5.5.3
  - name: ghcr.io/gaucho-racing/sentinel-saml
    newTag: 5.5.3
  - name: ghcr.io/gaucho-racing/sentinel-web
    newTag: 5.5.3
  - name: bk1031/kerbecs
    newTag: 3.2.0
