apiVersion: apps/v1
kind: Deployment
metadata:
  name: google
  namespace: sentinel
spec:
  # Single replica: the service runs a reconcile cron that mirrors group
  # membership out to Google Groups. With >1 replica each pod runs its own
  # cron, so two sweeps could write the same Google Group concurrently. The
  # writes are idempotent, but the cancel-and-restart coalescing and the
  # GOOGLE_SYNC_MAX_REMOVALS guard are per-process — keep one cron owner. This
  # is low-volume periodic work, so one replica is plenty.
  replicas: 1
  selector:
    matchLabels:
      app: google
  template:
    metadata:
      labels:
        app: google
    spec:
      # Topology spread — see comment in core.yaml. Inert at replicas: 1.
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: google
      containers:
        - name: google
          # Tag is set by kustomization.yaml's images block.
          image: ghcr.io/gaucho-racing/sentinel-google:latest
          ports:
            - containerPort: 9995
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "9995"
            - name: DATABASE_HOST
              value: postgres.sentinel.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: sentinel
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: POSTGRES_PASSWORD
            # Resolve inter-service calls through the kerbecs gateway's admin
            # API. Same admin creds the kerbecs deployment uses.
            - name: KERBECS_ENDPOINT
              value: http://kerbecs.sentinel.svc.cluster.local:10300
            - name: KERBECS_USER
              value: admin
            - name: KERBECS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: KERBECS_PASSWORD
            # Shared secret exchanged at startup for this service's pre-seeded
            # bearer JWT. Same value as every other sentinel-* deployment.
            - name: INTERNAL_BOOTSTRAP_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: INTERNAL_BOOTSTRAP_SECRET
            # Service-account JSON key for domain-wide delegation (scope
            # admin.directory.group.member). The only real secret here — marked
            # optional so the pod still boots before it's populated; sync just
            # no-ops until it's set (then restart the pod to pick it up).
            - name: GOOGLE_SERVICE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: GOOGLE_SERVICE_ACCOUNT
                  optional: true
            # The super-admin the service account impersonates. Just an email,
            # not a credential, so it's a plain value rather than a secret.
            - name: GOOGLE_ADMIN_SUBJECT
              value: admin@gauchoracing.com
---
apiVersion: v1
kind: Service
metadata:
  name: google
  namespace: sentinel
spec:
  selector:
    app: google
  ports:
    - port: 9995
      targetPort: 9995
