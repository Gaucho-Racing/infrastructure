apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth
  template:
    metadata:
      labels:
        app: oauth
    spec:
      # Topology spread — see comment in core.yaml.
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: oauth
      containers:
        - name: oauth
          # Tag is set by kustomization.yaml's images block.
          image: ghcr.io/gaucho-racing/sentinel-oauth:latest
          ports:
            - containerPort: 9997
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "9997"
            - name: DATABASE_HOST
              value: postgres.sentinel.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: sentinel
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: POSTGRES_PASSWORD
            # Resolve inter-service calls through the kerbecs gateway's admin
            # API (replaces the rincon registry). Same admin creds the kerbecs
            # deployment uses.
            - name: KERBECS_ENDPOINT
              value: http://kerbecs.sentinel.svc.cluster.local:10300
            - name: KERBECS_USER
              value: admin
            - name: KERBECS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: KERBECS_PASSWORD
            # OIDC issuer — the public base URL. MUST match core's ISSUER
            # exactly; the discovery document's `issuer` and the `iss` claim in
            # ID tokens have to be byte-identical for relying parties.
            - name: ISSUER
              value: https://sentinel-v5.gauchoracing.com
---
apiVersion: v1
kind: Service
metadata:
  name: oauth
  namespace: sentinel
spec:
  selector:
    app: oauth
  ports:
    - port: 9997
      targetPort: 9997
