apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord
  namespace: sentinel
spec:
  # Stays at 1 — multiple replicas would each open their own gateway
  # connection and double-process every Discord event.
  replicas: 1
  selector:
    matchLabels:
      app: discord
  template:
    metadata:
      labels:
        app: discord
    spec:
      containers:
        - name: discord
          # Tag is set by kustomization.yaml's images block.
          image: ghcr.io/gaucho-racing/sentinel-discord:latest
          ports:
            - containerPort: 9998
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "9998"
            - name: DATABASE_HOST
              value: postgres.sentinel.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: sentinel
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: POSTGRES_PASSWORD
            # Resolve inter-service calls through the kerbecs gateway's admin
            # API (replaces the rincon registry). Same admin creds the kerbecs
            # deployment uses.
            - name: KERBECS_ENDPOINT
              value: http://kerbecs.sentinel.svc.cluster.local:10300
            - name: KERBECS_USER
              value: admin
            - name: KERBECS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: KERBECS_PASSWORD
            - name: DISCORD_GUILD
              value: "756738476887638107"
            - name: DISCORD_PREFIX
              value: "!"
            - name: WEB_BASE_URL
              value: https://sentinel-v5.gauchoracing.com
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: DISCORD_TOKEN
            # Same value as on core; used at startup to exchange for
            # this service's pre-seeded bearer JWT.
            - name: INTERNAL_BOOTSTRAP_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: INTERNAL_BOOTSTRAP_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: discord
  namespace: sentinel
spec:
  selector:
    app: discord
  ports:
    - port: 9998
      targetPort: 9998
