apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: mapache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      # Spread across at least 2 nodes (minDomains) but tolerate skew
      # up to 1 (so 3 replicas → [2,1], not forced [1,1,1]).
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: dashboard
      containers:
        - name: dashboard
          # Tag is set by kustomization.yaml's images block.
          image: ghcr.io/gaucho-racing/mapache/dashboard:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: mapache
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 80
