# Mapache on the foundry k3s cluster. Same manifest set as the EKS tree
# (kubernetes/manifests/mapache/), diverging only in ingress.yaml
# (Traefik) and postgres.yaml (public Cloudflare hostname).
#
# All three off-cluster data services (gr-postgres, gr-mqtt,
# gr-clickhouse) stay in AWS and are reached over the public internet
# from on-prem via their gauchoracing.com hostnames. gr26 continues
# uploading Epic Shelter Parquet to s3://gaucho-racing/ using the same
# IAM keys — AWS_ACCESS_KEY_ID/SECRET stay in mapache-secrets.
#
# Manual Secret needed once after first sync:
#
#   kubectl -n mapache create secret generic mapache-secrets \
#     --from-literal=DATABASE_PASSWORD="$(cd ../../infra/environments/prod && terraform output -raw postgres_password)" \
#     --from-literal=MQTT_PASSWORD="$(cd ../../infra/environments/prod && terraform output -raw mqtt_password)" \
#     --from-literal=CLICKHOUSE_PASSWORD="$(cd ../../infra/environments/prod && terraform output -raw clickhouse_admin_password)" \
#     --from-literal=KERBECS_PASSWORD=... \
#     --from-literal=SENTINEL_CLIENT_SECRET=... \
#     --from-literal=SENTINEL_SA_TOKEN=... \
#     --from-literal=AWS_ACCESS_KEY_ID=... \
#     --from-literal=AWS_SECRET_ACCESS_KEY=...

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mapache
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Gaucho-Racing/infrastructure.git
    targetRevision: main
    path: kubernetes/manifests-foundry/mapache
  destination:
    server: https://kubernetes.default.svc
    namespace: mapache
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
