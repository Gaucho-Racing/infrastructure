# Sentinel: identity + OAuth + Discord stack.
#
#   web → kerbecs (gateway) → core / oauth / discord
#                          ↘ web
#                  rincon (service registry, used by core/oauth/discord)
#
# Postgres lives outside the cluster (on the gr-postgres EC2 in the same
# VPC). Pods reach it via the Cloudflare DNS name; the SG allows the EKS
# node SG.
#
# Manual Secret needed once after this Application first syncs:
#
#   kubectl -n sentinel create secret generic sentinel-secrets \
#     --from-literal=POSTGRES_PASSWORD="$(cd ../../infrastructure/infra/environments/prod && terraform output -raw postgres_password)" \
#     --from-literal=DISCORD_TOKEN=... \
#     --from-literal=RINCON_PASSWORD=... \
#     --from-literal=KERBECS_PASSWORD=...

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentinel
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Gaucho-Racing/infrastructure.git
    targetRevision: main
    path: kubernetes/manifests/sentinel
  destination:
    server: https://kubernetes.default.svc
    namespace: sentinel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
