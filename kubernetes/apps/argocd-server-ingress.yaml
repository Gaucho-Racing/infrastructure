# ArgoCD-managed Application that deploys the Ingress for ArgoCD itself.
# Self-referential but works fine — ArgoCD reconciles its own Ingress
# resource from this repo, the AWS Load Balancer Controller provisions
# the ALB, external-dns creates the Cloudflare record, and you reach
# the UI at https://argocd.internal.gauchoracing.com.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-server-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Gaucho-Racing/infrastructure.git
    targetRevision: main
    path: kubernetes/manifests/argocd-server-ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
