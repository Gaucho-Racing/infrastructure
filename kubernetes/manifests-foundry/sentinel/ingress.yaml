# Public entrypoint on the foundry k3s cluster. Traefik receives plain
# HTTP forwarded by the in-cluster cloudflared tunnel; TLS terminates at
# the Cloudflare edge. Host-based routing to the kerbecs gateway, which
# then routes to core/oauth/discord/saml/google/web internally.
#
# The public DNS record for sentinel-v5.gauchoracing.com is managed by
# Terraform (foundry.tf) as a CNAME to <tunnel-uuid>.cfargotunnel.com —
# external-dns is intentionally NOT annotating this Ingress, so the
# record stays terraform-owned during and after cutover.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel
  namespace: sentinel
spec:
  ingressClassName: traefik
  rules:
    - host: sentinel-v5.gauchoracing.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kerbecs
                port:
                  number: 10310
