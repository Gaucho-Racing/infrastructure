# In-cluster handle for the gr-postgres EC2 (still in AWS after the
# compute migration — same instance backing mapache + vault).
#
# From on-prem, this resolves via the Cloudflare A record
# gr-postgres.gauchoracing.com (gray-cloud, unproxied) to the EIP
# 52.32.150.44. Traffic goes over the public internet on 5432; the
# 32-char scram-sha-256 password is the only gate. The SG on the EC2
# allows 0.0.0.0/0 on 5432 (admin_cidr_blocks in modules/postgres-ec2).

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sentinel
spec:
  type: ExternalName
  externalName: gr-postgres.gauchoracing.com
