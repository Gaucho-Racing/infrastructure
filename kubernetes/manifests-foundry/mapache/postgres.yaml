# In-cluster handle for the gr-postgres EC2. Same instance as sentinel's
# postgres — DBs are isolated at the database level, not the instance.
#
# From on-prem, resolves via the Cloudflare A record
# gr-postgres.gauchoracing.com (unproxied) to the EIP. Traffic goes over
# the public internet on 5432; scram-sha-256 is the only gate.

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mapache
spec:
  type: ExternalName
  externalName: gr-postgres.gauchoracing.com
