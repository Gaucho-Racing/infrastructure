apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: mapache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      # Spread across at least 2 nodes (minDomains) but tolerate skew
      # up to 1 (so 3 replicas → [2,1], not forced [1,1,1]).
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: auth
      containers:
        - name: auth
          # Tag is set by kustomization.yaml's images block.
          image: ghcr.io/gaucho-racing/mapache/auth:latest
          ports:
            - containerPort: 7002
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "7002"
            - name: DATABASE_HOST
              value: postgres.mapache.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: postgres
            - name: DATABASE_NAME
              value: mapache
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: DATABASE_PASSWORD
            - name: KERBECS_ENDPOINT
              value: http://kerbecs.mapache.svc.cluster.local:10300
            - name: KERBECS_USER
              value: admin
            - name: KERBECS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: KERBECS_PASSWORD
            # Sentinel v5: JWKS lives at /api/core/keys under SENTINEL_URL,
            # so the separate JWKS env var is gone. SA token replaces the
            # v4 static SENTINEL_TOKEN.
            - name: SENTINEL_URL
              value: https://sentinel-v5.gauchoracing.com
            - name: SENTINEL_CLIENT_ID
              value: TIvD6jCH3mGV
            - name: SENTINEL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: SENTINEL_CLIENT_SECRET
            - name: SENTINEL_SA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mapache-secrets
                  key: SENTINEL_SA_TOKEN
            - name: SENTINEL_REDIRECT_URI
              value: https://mapache.gauchoracing.com/auth/login
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: mapache
spec:
  selector:
    app: auth
  ports:
    - port: 7002
      targetPort: 7002
