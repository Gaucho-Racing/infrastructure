# Public entrypoint on the foundry k3s cluster. Traefik receives plain
# HTTP forwarded by the in-cluster cloudflared tunnel; TLS terminates at
# the Cloudflare edge. Host-based routing to the kerbecs gateway, which
# routes to the backend services + dashboard internally.
#
# DNS for mapache.gauchoracing.com is managed by Terraform (foundry.tf).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mapache
  namespace: mapache
spec:
  ingressClassName: traefik
  rules:
    - host: mapache.gauchoracing.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kerbecs
                port:
                  number: 10310
