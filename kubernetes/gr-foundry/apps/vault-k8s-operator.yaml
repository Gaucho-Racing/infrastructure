# vault-k8s-operator on the foundry cluster. Watches VaultSecret CRDs in
# this cluster and syncs values from Vault into k8s Secrets, so future
# service migrations can declare their secrets in git instead of running
# manual `kubectl create secret` commands.
#
# Same upstream chart + version pin as the (soon-retired) gr-prod install.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-k8s-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Gaucho-Racing/vault-k8s-operator.git
    targetRevision: v1.1.1
    path: config/default
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-k8s-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
