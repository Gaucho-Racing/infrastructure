apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bifrost-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Gaucho-Racing/infrastructure.git
    targetRevision: main
    path: kubernetes/gr-foundry/manifests/bifrost
  destination:
    server: https://kubernetes.default.svc
    namespace: bifrost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
