# In-cluster handle for the gr-postgres EC2 (still in AWS). Same instance
# as sentinel + mapache; isolated by DB name (vault).
#
# From on-prem, resolves via the Cloudflare A record
# gr-postgres.gauchoracing.com to the EIP. Traffic goes over the public
# internet on 5432; scram-sha-256 is the only gate.

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vault
spec:
  type: ExternalName
  externalName: gr-postgres.gauchoracing.com
