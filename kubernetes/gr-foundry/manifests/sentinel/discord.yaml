apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord
  template:
    metadata:
      labels:
        app: discord
    spec:
      containers:
        - name: discord
          image: ghcr.io/gaucho-racing/sentinel-discord:latest
          ports:
            - containerPort: 9998
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: sentinel-secrets
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "9998"
            - name: DATABASE_NAME
              value: sentinel
            - name: DATABASE_HOST
              value: postgres.sentinel.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: discord
  namespace: sentinel
spec:
  selector:
    app: discord
  ports:
    - port: 9998
      targetPort: 9998
