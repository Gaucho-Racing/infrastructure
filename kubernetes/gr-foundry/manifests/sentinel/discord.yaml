apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord
  namespace: sentinel
spec:
  # Stays at 1 — multiple replicas would each open their own gateway
  # connection and double-process every Discord event.
  replicas: 1
  selector:
    matchLabels:
      app: discord
  template:
    metadata:
      labels:
        app: discord
    spec:
      containers:
        - name: discord
          image: ghcr.io/gaucho-racing/sentinel-discord:latest
          ports:
            - containerPort: 9998
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - secretRef:
                name: sentinel-secrets
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "9998"
            - name: DATABASE_NAME
              value: sentinel
            # TEMPORARY DATABASE_HOST override — see core.yaml for the
            # rationale. Remove once the Vault value is corrected.
            - name: DATABASE_HOST
              value: gr-postgres.gauchoracing.com
---
apiVersion: v1
kind: Service
metadata:
  name: discord
  namespace: sentinel
spec:
  selector:
    app: discord
  ports:
    - port: 9998
      targetPort: 9998
