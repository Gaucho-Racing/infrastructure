apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
    spec:
      containers:
        - name: core
          image: ghcr.io/gaucho-racing/sentinel-core:latest
          ports:
            - containerPort: 9999
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Only truly-structural env stays plain here (deployment env,
          # port that must match containerPort, universal Postgres port).
          # Everything else — including plain URLs and DB names — comes
          # from sentinel-secrets, which is materialized by the
          # VaultSecretSync in this namespace. See vaultsecretsync.yaml.
          envFrom:
            - secretRef:
                name: sentinel-secrets
          env:
            - name: ENV
              value: PROD
            - name: PORT
              value: "9999"
            - name: DATABASE_NAME
              value: sentinel
            # TEMPORARY: override DATABASE_HOST and POSTGRES_PASSWORD from
            # the Vault-sourced secret while we debug why sentinel-secrets
            # is being populated with wrong/stale values. k8s env: wins
            # over envFrom:, so these values are what the container sees.
            # Remove both overrides once VaultSecretSync is confirmed
            # writing correct values, and rotate the postgres password
            # since it's exposed in this commit.
            - name: DATABASE_HOST
              value: gr-postgres.gauchoracing.com
            - name: POSTGRES_PASSWORD
              value: JjxkVmmiVsy06DQWC0NRiw3hCf132wjG
---
apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: sentinel
spec:
  selector:
    app: core
  ports:
    - port: 9999
      targetPort: 9999
