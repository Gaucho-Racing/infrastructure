# Materializes the k8s Secret `sentinel-secrets` from the `sentinel-prod`
# app-secret in Vault. vault-k8s-operator watches this CR, uses the
# sentinel-namespace default ServiceAccount to authenticate to Vault
# (audience: gaucho-racing-vault), and refreshes the k8s Secret every
# refreshInterval.
#
# Editing any value in Vault → operator re-fetches on next tick →
# writes the new value into sentinel-secrets → restarts every Deployment
# listed in rolloutTargets → pods pick up the change. That's the whole
# reason we're using this pattern: any secret or config rotation is a
# Vault UI edit + wait, no kubectl or PR.
#
# The `secrets` map is <k8s-secret-key>: <vault-app>.<vault-field>. We
# use uppercase k8s keys to match the historical sentinel-secrets shape,
# and lowercase snake_case in Vault which matches vault-server conventions.
#
# One-time pre-merge bootstrap: populate the `sentinel-prod` app-secret
# in Vault UI (https://vault.gauchoracing.com) with all 19 fields below.
# Values come from the gr-prod sentinel-secrets Secret + the existing
# plain env values on the gr-prod Deployments.

apiVersion: vault.gauchoracing.com/v1alpha1
kind: VaultSecretSync
metadata:
  name: sentinel-secrets
  namespace: sentinel
spec:
  serviceAccountName: default
  target:
    name: sentinel-secrets
    type: Opaque
  refreshInterval: 5m
  rolloutTargets:
    - kind: Deployment
      name: core
    - kind: Deployment
      name: oauth
    - kind: Deployment
      name: discord
    - kind: Deployment
      name: saml
    - kind: Deployment
      name: google
    - kind: Deployment
      name: kerbecs
  secrets:
    # Postgres connection — sourced from the shared `gr-postgres` app-secret
    # so we don't duplicate creds per-app. Rotating the postgres password
    # is a single Vault UI edit that rolls every app that references it.
    DATABASE_HOST: gr-postgres.database_host
    DATABASE_PORT: gr-postgres.database_port
    DATABASE_USER: gr-postgres.database_user
    # Sentinel reads `DATABASE_PASSWORD` from env, not `POSTGRES_PASSWORD`
    # (see core/config/config.go). Since envFrom uses the Secret key
    # name as the env var name, we map the Vault field into a Secret
    # key called DATABASE_PASSWORD.
    DATABASE_PASSWORD: gr-postgres.database_password

    # Sentinel-specific sensitive values.
    INTERNAL_BOOTSTRAP_SECRET: sentinel-prod.internal_bootstrap_secret
    KERBECS_PASSWORD: sentinel-prod.kerbecs_password
    DISCORD_TOKEN: sentinel-prod.discord_token
    DISCORD_CLIENT_SECRET: sentinel-prod.discord_client_secret
    GOOGLE_SERVICE_ACCOUNT: sentinel-prod.google_service_account

    # Sentinel-specific config (previously plain env in Deployment
    # manifests). Moved into Vault so any rotation / URL change is a
    # Vault UI edit that automatically rolls the pods.
    #
    # DATABASE_NAME is deliberately NOT here — it's a per-app structural
    # constant that matches the app name and never rotates. Hardcoded as
    # plain env on each Deployment instead. Same pattern as vault and
    # mapache.
    ISSUER: sentinel-prod.issuer
    KERBECS_ENDPOINT: sentinel-prod.kerbecs_endpoint
    KERBECS_USER: sentinel-prod.kerbecs_user
    DISCORD_CLIENT_ID: sentinel-prod.discord_client_id
    DISCORD_REDIRECT_URI: sentinel-prod.discord_redirect_uri
    DISCORD_GUILD: sentinel-prod.discord_guild
    DISCORD_PREFIX: sentinel-prod.discord_prefix
    WEB_BASE_URL: sentinel-prod.web_base_url
    TEAM_GOOGLE_CLIENT_ID: sentinel-prod.team_google_client_id
    GOOGLE_ADMIN_SUBJECT: sentinel-prod.google_admin_subject
