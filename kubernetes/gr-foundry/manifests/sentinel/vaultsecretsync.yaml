# Materializes the k8s Secret `sentinel-secrets` from the `sentinel`
# app-secret in Vault. vault-k8s-operator watches this CR, uses the
# sentinel-namespace default ServiceAccount to authenticate to Vault
# (audience: gaucho-racing-vault), and refreshes the k8s Secret every
# refreshInterval.
#
# Editing any value in Vault → operator re-fetches on next tick →
# writes the new value into sentinel-secrets → restarts every Deployment
# listed in rolloutTargets → pods pick up the change. That's the whole
# reason we're using this pattern: any secret or config rotation is a
# Vault UI edit + wait, no kubectl or PR.
#
# The `secrets` map is <k8s-secret-key>: <vault-app>.<vault-field>. We
# use uppercase k8s keys to match the historical sentinel-secrets shape,
# and lowercase snake_case in Vault which matches vault-server conventions.
#
# One-time pre-merge bootstrap: populate the `sentinel` app-secret in
# Vault UI (https://vault.gauchoracing.com) with all 19 fields below.
# Values come from the gr-prod sentinel-secrets Secret + the existing
# plain env values on the gr-prod Deployments.

apiVersion: vault.gauchoracing.com/v1alpha1
kind: VaultSecretSync
metadata:
  name: sentinel-secrets
  namespace: sentinel
spec:
  serviceAccountName: default
  target:
    name: sentinel-secrets
    type: Opaque
  refreshInterval: 5m
  rolloutTargets:
    - kind: Deployment
      name: core
    - kind: Deployment
      name: oauth
    - kind: Deployment
      name: discord
    - kind: Deployment
      name: saml
    - kind: Deployment
      name: google
    - kind: Deployment
      name: kerbecs
  secrets:
    # Sensitive (previously in sentinel-secrets Secret)
    POSTGRES_PASSWORD: sentinel.postgres_password
    INTERNAL_BOOTSTRAP_SECRET: sentinel.internal_bootstrap_secret
    KERBECS_PASSWORD: sentinel.kerbecs_password
    DISCORD_TOKEN: sentinel.discord_token
    DISCORD_CLIENT_SECRET: sentinel.discord_client_secret
    GOOGLE_SERVICE_ACCOUNT: sentinel.google_service_account

    # Config (previously plain env in Deployment manifests) — moved here
    # so any rotation / URL change is a Vault UI edit that automatically
    # rolls the pods.
    DATABASE_HOST: sentinel.database_host
    DATABASE_USER: sentinel.database_user
    DATABASE_NAME: sentinel.database_name
    ISSUER: sentinel.issuer
    KERBECS_ENDPOINT: sentinel.kerbecs_endpoint
    KERBECS_USER: sentinel.kerbecs_user
    DISCORD_CLIENT_ID: sentinel.discord_client_id
    DISCORD_REDIRECT_URI: sentinel.discord_redirect_uri
    DISCORD_GUILD: sentinel.discord_guild
    DISCORD_PREFIX: sentinel.discord_prefix
    WEB_BASE_URL: sentinel.web_base_url
    TEAM_GOOGLE_CLIENT_ID: sentinel.team_google_client_id
    GOOGLE_ADMIN_SUBJECT: sentinel.google_admin_subject
